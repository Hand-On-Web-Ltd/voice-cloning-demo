<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Cloning Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎙️ Voice Cloning Demo</h1>
    <p class="subtitle">Powered by ElevenLabs</p>

    <div class="form-group">
      <label for="voice-select">Voice</label>
      <select id="voice-select"><option>Loading voices...</option></select>
    </div>

    <div class="form-group">
      <label for="text-input">Text</label>
      <textarea id="text-input" rows="5" placeholder="Type something to hear it spoken..."></textarea>
    </div>

    <button id="generate-btn" class="btn-generate">Generate Speech</button>

    <div id="result" class="result hidden">
      <audio id="audio-player" controls></audio>
    </div>

    <div id="error" class="error hidden"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
